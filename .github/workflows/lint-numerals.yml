name: i18n numerals lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-numerals:
    name: Western digits + Intl.numberingSystem guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run i18n numerals lint
        run: node scripts/lint-i18n-numerals.mjs
