name: Test suite

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: npm test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test

  typecheck:
    name: npm run check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript typecheck
        run: npm run check

  schema-migrations:
    # Task #234 — fail the build when a column is added to shared/schema.ts
    # without a matching boot-migrate ensure-script. Production deploys do
    # not run drizzle-kit push, so missing ensure-scripts crash the API
    # at runtime with `column "..." does not exist`.
    name: Schema migration coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify ensure-script coverage
        run: node scripts/check-schema-migrations.mjs

      - name: Verify boot-migrate wiring
        # Task #236 — fail the build when an ensure-*.ts script exists but
        # its exported function is not awaited from server/index.ts. A
        # wired-but-unregistered ensure-script crashes production the same
        # way a missing one does.
        run: node scripts/check-boot-migrate-wiring.mjs
