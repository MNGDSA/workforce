name: Android APK build

on:
  push:
    branches: [main]
    paths:
      - "mobile-android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build-apk:
    name: Build debug + release APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew execute permission
        run: chmod +x gradlew || true

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Build release APK (unsigned)
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: workforce-debug-apk
          path: mobile-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: workforce-release-apk-unsigned
          path: mobile-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
