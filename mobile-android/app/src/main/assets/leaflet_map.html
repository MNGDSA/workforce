<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; }
html, body, #map { width: 100%; height: 100%; background: #f0f0f0; }
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map = L.map('map').setView([21.4225, 39.8262], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '\u00a9 OSM',
    maxZoom: 19
}).addTo(map);

function loadZones(zonesJson) {
    try {
        var zones = JSON.parse(zonesJson);
        var layers = [];
        zones.forEach(function(z) {
            var circle = L.circle([z.lat, z.lng], {
                radius: z.radius,
                color: '#3D8B67',
                fillColor: '#3D8B67',
                fillOpacity: 0.15,
                weight: 2
            }).addTo(map).bindPopup('<b>' + z.name + '</b><br>Radius: ' + z.radius + 'm');

            L.marker([z.lat, z.lng]).addTo(map)
                .bindPopup('<b>' + z.name + '</b><br>Radius: ' + z.radius + 'm');

            layers.push(circle);
        });
        if (layers.length > 0) {
            var group = L.featureGroup(layers);
            map.fitBounds(group.getBounds().pad(0.2));
        }
    } catch(e) {
        document.body.innerHTML = '<p style="padding:20px;color:red">Error: ' + e.message + '</p>';
    }
}
</script>
</body>
</html>
